<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід | Beauty Salon</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-auth">
    <main class="auth-card auth-card--compact">
        <a href="../index.html" class="back-link">&larr; На головну</a>
        <p class="home-eyebrow">Авторизація</p>
        <h1 class="auth-title">Увійди в свій акаунт</h1>
        <p class="auth-note">Авторизуйся, щоб керувати записами, переглядати профіль і бронювати послуги.</p>

        <form id="loginForm" class="auth-form">
            <input type="email" id="email" placeholder="E-MAIL" required>
            <input type="password" id="password" placeholder="ПАРОЛЬ" required>

            <div id="loginError" class="form-error" aria-live="polite" role="alert" hidden></div>

            <button type="submit" class="btn-premium btn-block">УВІЙТИ</button>
        </form>

        <p class="auth-note auth-note--center">
            Немає акаунту? <a href="register.html">Зареєструватися</a>
        </p>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/login.js"></script>
</body>
</html>
