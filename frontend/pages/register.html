<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація | Beauty Salon</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-auth">
    <main class="auth-card">
        <a href="../index.html" class="back-link">&larr; На головну</a>
        <p class="home-eyebrow">Реєстрація</p>
        <h1 class="auth-title">Створити акаунт</h1>
        <p class="auth-note">Реєстрація доступна лише для клієнтів. Адмін створюється окремо.</p>

        <form id="registerForm" class="auth-form">
            <input type="text" id="name" placeholder="ІМ'Я ТА ПРІЗВИЩЕ" required>
            <input type="email" id="email" placeholder="E-MAIL" required>
            <input type="password" id="password" placeholder="ПАРОЛЬ" required>

            <input type="hidden" id="role" value="client">
            <p class="auth-note auth-note--center">Реєстрація доступна лише для клієнтів.</p>

            <div id="registerError" class="form-error" aria-live="polite" role="alert" hidden></div>

            <button type="submit" class="btn-premium btn-block">СТВОРИТИ АКАУНТ</button>
        </form>

        <p class="auth-note auth-note--center">
            Вже є акаунт? <a href="login.html">Увійти</a>
        </p>
    </main>

    <script src="../js/api.js"></script>
    <script src="../js/register.js"></script>
</body>
</html>
