<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Реєстрація | Beauty Salon</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-auth">
    <div class="container" style="max-width: 450px; margin-top: 5vh;">
        
        <a href="../index.html" class="back-link">&larr; НА ГОЛОВНУ</a>
        
        <h2>Реєстрація</h2>
        <form id="registerForm">
            <input type="text" id="name" placeholder="ІМ'Я ТА ПРІЗВИЩЕ" required>
            <input type="email" id="email" placeholder="E-MAIL" required>
            <input type="password" id="password" placeholder="ПАРОЛЬ" required>
            
            <select id="role" style="margin-bottom: 25px;">
                <option value="client">РЕЄСТРАЦІЯ КЛІЄНТА</option>
                <option value="master">РЕЄСТРАЦІЯ МАЙСТРА</option>
                <option value="admin">РЕЄСТРАЦІЯ АДМІНА</option>
            </select>
            <div id="registerError" class="form-error" aria-live="polite" role="alert" style="display:none;"></div>
            
            <button type="submit" class="btn-premium" style="width: 100%;">СТВОРИТИ АКАУНТ</button>
        </form>
        <p style="text-align: center; font-size: 12px; margin-top: 25px;">
            Вже є акаунт? <a href="login.html" style="color: black; font-weight: 500;">УВІЙТИ</a>
        </p>
    </div>
    <script src="../js/api.js"></script>
    <script src="../js/register.js"></script>
</body>
</html>
