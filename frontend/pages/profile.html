<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Мій Профіль | Beauty Salon</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-main">
    <header class="navbar">
        <a href="../index.html" class="logo">Beauty Salon</a>
        <nav class="nav-links">
             <a href="../index.html">Головна</a>
        </nav> 
    </header>

    <div class="container profile-container">
        <h1>Особистий кабінет клієнта</h1>
        
        <div class="profile-grid">
            <div class="profile-card">
                <h3>Мої дані</h3>
                <form id="editProfileForm">
                    <div class="form-group">
                        <label>Ім'я:</label>
                        <input type="text" id="editName" class="input-field">
                    </div>
                    <div class="form-group">
                        <label>Email:</label>
                        <input type="email" id="editEmail" class="input-field">
                    </div>
                    <button type="submit" class="btn-premium">ЗБЕРЕГТИ ЗМІНИ</button>
                </form>
            </div>

            <div class="history-card">
                <h3>Історія моїх записів</h3>
                <div id="userBookingsList">
                    <p class="loading-text">Завантаження записів...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/profile.js"></script>
</body>
</html>
